name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            binary_name: s3tele-linux-amd64
          - os: linux
            arch: arm64
            binary_name: s3tele-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build ${{ matrix.os }}-${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.binary_name }} ./cmd/s3tele

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: s3tele-linux-amd64
          path: .

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: s3tele-linux-arm64
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and Push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}-amd64
            ghcr.io/${{ github.repository }}:amd64
          build-args: |
            BINARY_NAME=s3tele-linux-amd64

      - name: Build and Push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}-arm64
            ghcr.io/${{ github.repository }}:arm64
          build-args: |
            BINARY_NAME=s3tele-linux-arm64

      - name: Create and push multi-arch manifest
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }} \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}-arm64
          
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:amd64 \
            ghcr.io/${{ github.repository }}:arm64